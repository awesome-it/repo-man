# Run repo-man for local use. Repo data in ./repo_data (bind mount).
# Usage: docker compose up -d
# Metrics: http://localhost:8080/metrics
# Pre-built image: awesomeit/repo-man:latest. To use it, set 'image: awesomeit/repo-man:latest' and remove 'build'.
# Uses host DNS (/etc/resolv.conf) and proxy env (HTTP_PROXY, etc.) from host when set.

services:
  repo-man:
    build: .
    # image: awesomeit/repo-man:latest   # use this instead of build to run the pre-built image
    ports:
      - "8080:8080"
    environment:
      - REPO_MIRROR_REPO_ROOT=/data
      - CACHE_VERSIONS_PER_PACKAGE=3
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-}
      - http_proxy=${http_proxy:-}
      - https_proxy=${https_proxy:-}
      - no_proxy=${no_proxy:-}
    volumes:
      - ./repo_data:/data
      - /etc/resolv.conf:/etc/resolv.conf:ro
    command: ["serve", "--bind", "0.0.0.0", "--port", "8080"]
