# Docker-based integration test: mirror Ubuntu (jammy + noble + updates/security), Rocky 9 BaseOS (RPM), and Alpine 3.19.
# Clients: vim-three-versions (caches 2 vim .debs; serve auto-prunes to keep 1 — see logs), prune-demo (optional), ubuntu-client, ubuntu-client-24, rpm-client, alpine-client, build-publish-install-client (build .deb → publish via API → install).
# Run: docker compose -f tests/docker/compose.integration.yaml up --build -d
#       docker compose -f tests/docker/compose.integration.yaml run --rm vim-three-versions
#       docker compose -f tests/docker/compose.integration.yaml run --rm prune-demo
#       docker compose -f tests/docker/compose.integration.yaml run --rm ubuntu-client
#       docker compose -f tests/docker/compose.integration.yaml run --rm ubuntu-client-24
# Then: docker compose -f tests/docker/compose.integration.yaml down

services:
  repo-man:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "18080:8080"
    environment:
      REPO_MIRROR_REPO_ROOT: /data
      CACHE_VERSIONS_PER_PACKAGE: "1"
    volumes:
      - repo_data:/data
    entrypoint: ["sh", "-c"]
    # Seed upstreams if config missing, then serve with publish API enabled (for build-publish-install test)
    command:
      - |
        if [ ! -f /data/config.yaml ]; then
          repo-man cache add-upstream --name ubuntu --url http://archive.ubuntu.com/ubuntu/ --format apt --layout classic --path-prefix /ubuntu --suites jammy,jammy-updates,jammy-security,noble,noble-updates,noble-security --components main --archs amd64
        fi
        repo-man cache add-upstream --name rocky9 --url https://dl.rockylinux.org/pub/rocky/9/BaseOS/x86_64/os/ --format rpm --path-prefix /rocky9
        repo-man cache add-upstream --name alpine319 --url https://dl-cdn.alpinelinux.org/alpine/v3.19/main --format alpine --path-prefix /alpine319
        exec repo-man serve --bind 0.0.0.0 --port 8080 --enable-api
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/metrics')"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  # Simulate a host with vim installed that does one update after another; caches 2 vim .debs. CACHE_VERSIONS_PER_PACKAGE=1 so prune drops 1.
  vim-three-versions:
    image: ubuntu:24.04
    depends_on:
      repo-man:
        condition: service_healthy
    environment:
      DEBIAN_FRONTEND: noninteractive
    command:
      - bash
      - -c
      - |
        rm -f /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources 2>/dev/null || true
        echo 'deb [allow-insecure=yes] http://repo-man:8080/ubuntu noble main' > /etc/apt/sources.list
        echo 'deb [allow-insecure=yes] http://repo-man:8080/ubuntu noble-updates main' >> /etc/apt/sources.list
        echo 'deb [allow-insecure=yes] http://repo-man:8080/ubuntu noble-security main' >> /etc/apt/sources.list
        apt-get update -o Acquire::AllowInsecureRepositories=true -o Acquire::AllowDowngradeToInsecureRepositories=true
        apt-get install -y --allow-unauthenticated vim=2:9.1.0016-1ubuntu7
        apt-get update -o Acquire::AllowInsecureRepositories=true -o Acquire::AllowDowngradeToInsecureRepositories=true
        apt-get install -y --allow-unauthenticated vim=2:9.1.0016-1ubuntu7.9
        echo "Simulated host: initial vim install, then update (second vim version cached)."

  # Run prune (keep 1 per package); one vim is dropped from cache.
  prune-demo:
    build:
      context: ../..
      dockerfile: Dockerfile
    depends_on:
      vim-three-versions:
        condition: service_completed_successfully
    environment:
      REPO_MIRROR_REPO_ROOT: /data
    volumes:
      - repo_data:/data
    entrypoint: ["repo-man"]
    command: ["cache", "prune"]

  ubuntu-client:
    image: ubuntu:22.04
    depends_on:
      repo-man:
        condition: service_healthy
    environment:
      DEBIAN_FRONTEND: noninteractive
    # Use our mirror and install vim and curl (only via repo-man)
    command:
      - bash
      - -c
      - |
        rm -f /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources 2>/dev/null || true
        echo 'deb [allow-insecure=yes] http://repo-man:8080/ubuntu jammy main' > /etc/apt/sources.list
        apt-get update -o Acquire::AllowInsecureRepositories=true -o Acquire::AllowDowngradeToInsecureRepositories=true
        apt-get install -y --allow-unauthenticated vim curl
        vim --version
        curl --version

  ubuntu-client-24:
    image: ubuntu:24.04
    depends_on:
      repo-man:
        condition: service_healthy
    environment:
      DEBIAN_FRONTEND: noninteractive
    command:
      - bash
      - -c
      - |
        rm -f /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources 2>/dev/null || true
        echo 'deb [allow-insecure=yes] http://repo-man:8080/ubuntu noble main' > /etc/apt/sources.list
        apt-get update -o Acquire::AllowInsecureRepositories=true -o Acquire::AllowDowngradeToInsecureRepositories=true
        apt-get install -y --allow-unauthenticated vim
        vim --version

  # RPM client: use repo-man as mirror for Rocky 9 BaseOS
  rpm-client:
    image: rockylinux:9
    depends_on:
      repo-man:
        condition: service_healthy
    command:
      - bash
      - -c
      - |
        echo '[rocky9]' > /etc/yum.repos.d/rocky.repo
        echo 'name=Rocky 9 BaseOS (via repo-man)' >> /etc/yum.repos.d/rocky.repo
        echo 'baseurl=http://repo-man:8080/rocky9' >> /etc/yum.repos.d/rocky.repo
        echo 'enabled=1' >> /etc/yum.repos.d/rocky.repo
        echo 'gpgcheck=0' >> /etc/yum.repos.d/rocky.repo
        dnf install -y tar
        tar --version

  # Alpine client: use repo-man as mirror for Alpine 3.19 main
  alpine-client:
    image: alpine:3.19
    depends_on:
      repo-man:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        echo 'http://repo-man:8080/alpine319' >> /etc/apk/repositories
        apk add --no-cache musl
        musl --version || true

  # Smoke test: GET /api/v1/health (repo-man started with --enable-api)
  api-health-check:
    image: alpine:3.19
    depends_on:
      repo-man:
        condition: service_healthy
    command: ["sh", "-c", "wget -q -O- http://repo-man:8080/api/v1/health | grep -q '\"status\":\"ok\"' && echo OK"]

  # Build a trivial .deb (at image build time), publish via API to repo-man, then client installs it (build → publish → install)
  build-publish-install-builder:
    build:
      context: .
      dockerfile: Dockerfile.build-publish
    depends_on:
      repo-man:
        condition: service_healthy

  build-publish-install-client:
    image: ubuntu:24.04
    depends_on:
      repo-man:
        condition: service_healthy
      build-publish-install-builder:
        condition: service_completed_successfully
    environment:
      DEBIAN_FRONTEND: noninteractive
    command:
      - bash
      - -ce
      - |
        echo 'deb [allow-insecure=yes] http://repo-man:8080/ubuntu noble main' > /etc/apt/sources.list
        apt-get update -o Acquire::AllowInsecureRepositories=true -qq && apt-get install -y -qq curl
        curl -fsS -o /tmp/hello-repoman_1.0_amd64.deb http://repo-man:8080/local/pool/main/amd64/hello-repoman_1.0_amd64.deb
        dpkg -i /tmp/hello-repoman_1.0_amd64.deb
        dpkg -l hello-repoman
        echo "Build-publish-install OK"

volumes:
  repo_data: {}
