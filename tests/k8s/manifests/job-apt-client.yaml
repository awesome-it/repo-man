# Job that runs an Ubuntu container, points APT at repo-man, and installs a package.
# Success (exit 0) means the Kubernetes deployment served the mirror correctly.
apiVersion: batch/v1
kind: Job
metadata:
  name: apt-client
  namespace: default
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: apt-client
          image: ubuntu:24.04
          command:
            - bash
            - -c
            - |
              set -e
              rm -f /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources 2>/dev/null || true
              echo 'deb [allow-insecure=yes] http://repo-man:8080/ubuntu noble main' > /etc/apt/sources.list
              apt-get update -o Acquire::AllowInsecureRepositories=true -o Acquire::AllowDowngradeToInsecureRepositories=true
              apt-get install -y --allow-unauthenticated vim
              vim --version
              echo "K8s integration test: APT client succeeded."
